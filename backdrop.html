<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BackDrop — حذف الخلفية</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="_shared/style.css">
<style>
.img-drop {
  border:2px dashed var(--border); border-radius:var(--radius);
  padding:28px 16px; text-align:center; cursor:pointer; transition:all .2s;
}
.img-drop:hover,.img-drop.over{border-color:var(--accent);background:rgba(10,132,255,.06)}
.before-after {
  display:none; gap:8px; margin-top:12px;
}
.before-after.show{display:grid; grid-template-columns:1fr 1fr;}
.ba-card { text-align:center; }
.ba-label { font-size:.72rem; color:var(--text-dim); margin-bottom:6px; font-weight:600; text-transform:uppercase; }
.ba-img { width:100%; border-radius:var(--radius-sm); border:1.5px solid var(--border); }
.replace-opts { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.bg-replace-preview {
  display:none; width:100%; height:100px;
  border-radius:var(--radius-sm); border:1.5px solid var(--border);
  margin-top:8px; object-fit:cover;
}
</style>
</head>
<body>
<div class="app-header">
  <div class="app-icon">✂️</div>
  <div>
    <div class="app-title">BackDrop</div>
    <div class="app-sub">حذف الخلفية بالذكاء الاصطناعي</div>
  </div>
</div>

<div class="card">
  <div class="card-label">الصورة</div>
  <div class="img-drop" id="imgDrop" onclick="document.getElementById('imgInp').click()">
    <div style="font-size:2.5rem">✂️</div>
    <div>اسحب صورة أو اضغط للاختيار</div>
    <div class="drop-text mt8">PNG • JPG • WEBP</div>
  </div>
  <input type="file" id="imgInp" accept="image/*" style="display:none" onchange="onImg(this)">
</div>

<div class="before-after" id="baWrap">
  <div class="ba-card">
    <div class="ba-label">📷 الأصلية</div>
    <img id="origImg" class="ba-img" alt="original">
  </div>
  <div class="ba-card">
    <div class="ba-label">✨ بعد الحذف</div>
    <div style="background:repeating-conic-gradient(#3a3a3c 0% 25%,#2c2c2e 0% 50%) 0 0/16px 16px;
                border-radius:var(--radius-sm);border:1.5px solid var(--border);
                height:100%;display:flex;align-items:center;justify-content:center;
                min-height:100px;">
      <span style="color:var(--text-dim);font-size:.8rem">معاينة بعد المعالجة</span>
    </div>
  </div>
</div>

<div id="optCard" class="card" style="display:none">
  <div class="card-label">استبدال الخلفية بـ</div>
  <div class="replace-opts">
    <span class="chip active" onclick="setBg(this,'transparent')">🔲 شفاف</span>
    <span class="chip" onclick="setBg(this,'white')">⬜ أبيض</span>
    <span class="chip" onclick="setBg(this,'black')">⬛ أسود</span>
    <span class="chip" onclick="setBg(this,'blur')">🌫 ضبابي</span>
    <span class="chip" onclick="setBg(this,'studio')">🏢 استوديو</span>
    <span class="chip" onclick="setBg(this,'nature')">🌿 طبيعة</span>
    <span class="chip" onclick="setBg(this,'gradient')">🌈 تدرج</span>
  </div>
</div>

<button class="btn btn-primary" id="sendBtn" style="display:none" onclick="doSend()">
  🤖 معالجة وإرسال النتيجة
</button>
<div class="spinner" id="spin"></div>
<div class="result" id="result"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

let bgChoice = "transparent";

function onImg(inp) {
  const file = inp.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("origImg").src = e.target.result;
    document.getElementById("baWrap").classList.add("show");
    document.getElementById("optCard").style.display = "block";
    document.getElementById("sendBtn").style.display = "flex";
  };
  reader.readAsDataURL(file);
}

function setBg(el, mode) {
  document.querySelectorAll(".replace-opts .chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  bgChoice = mode;
}

function doSend() {
  document.getElementById("spin").classList.add("show");
  document.getElementById("sendBtn").disabled = true;
  tg.sendData(JSON.stringify({action:"backdrop", bg:bgChoice}));
  setTimeout(() => {
    document.getElementById("spin").classList.remove("show");
    const r = document.getElementById("result");
    r.textContent = "✅ أرسل الصورة في المحادثة والبوت سيعالجها!";
    r.className = "result show";
    document.getElementById("sendBtn").disabled = false;
    setTimeout(() => tg.close(), 2200);
  }, 1000);
}

// Drag
const dz = document.getElementById("imgDrop");
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("over")});
dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
dz.addEventListener("drop",e=>{
  e.preventDefault();dz.classList.remove("over");
  const f=e.dataTransfer.files[0];
  if(f){document.getElementById("imgInp").files=e.dataTransfer.files;onImg(document.getElementById("imgInp"));}
});
</script>
</body>
</html>
